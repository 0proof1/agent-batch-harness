name: Bug report
description: Report a reproducible Agent Batch Harness defect
title: "bug: "
body:
  - type: markdown
    attributes:
      value: Remove credentials, private prompts, and sensitive logs.
  - type: input
    id: version
    attributes:
      label: Agent Batch Harness and Python versions
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
